<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Gestión de Usuarios</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
</head>
<body>

<header class="app-header">
  <div class="header-brand u-pointer" onclick="window.location.href='menu.html'">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Gestión de Usuarios</span>
  </div>
  <div class="header-user">
    <div class="user-badge"><span id="hdr-name">—</span></div>
    <button class="btn btn-sm btn-outline btn-icon" id="btn-back" aria-label="Volver" title="Volver"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
  </div>
</header>

<main class="app-main">
  <div class="hist-page">
    <div class="hist-toolbar">
      <span style="font-weight:600;color:var(--gray-700);">Usuarios del sistema</span>
      <button class="btn btn-primary btn-sm" id="btn-add-user">+ Agregar usuario</button>
    </div>
    <div id="users-list" class="users-list">
      <div class="hist-loading">Cargando usuarios…</div>
    </div>
  </div>
</main>

<!-- Modal: Agregar / Editar usuario -->
<div class="modal-overlay hidden" id="modal-user">
  <div class="modal modal--sm">
    <div class="modal-header">
      <span class="modal-title" id="modal-user-title">Agregar usuario</span>
      <button class="modal-close" id="modal-user-close"><svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="user-codigo">Código (4 dígitos)</label>
        <input type="text" id="user-codigo" class="form-control" placeholder="0001" maxlength="4">
      </div>
      <div class="form-group u-mb-0">
        <label for="user-nombre">Nombre completo</label>
        <input type="text" id="user-nombre" class="form-control" placeholder="Nombre y apellido / título">
      </div>
      <div id="modal-user-error" class="alert alert-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-user-cancel">Cancelar</button>
      <button class="btn btn-primary" id="modal-user-save">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Confirmar acción -->
<div class="modal-overlay hidden" id="modal-confirm">
  <div class="modal modal--sm">
    <div class="modal-header">
      <span class="modal-title" id="modal-confirm-title">Confirmar</span>
    </div>
    <div class="modal-body" style="text-align:center;padding:1.5rem 1.25rem;">
      <p id="modal-confirm-msg" style="color:var(--gray-600);"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-confirm-no">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm-yes">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/usuarios.js"></script>
</body>
</html>
