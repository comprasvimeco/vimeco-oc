<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Ficha de Equipo</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <style>
    .eq-ficha { max-width: 640px; margin: 0 auto; }

    /* Foto */
    .eq-foto-wrap { display:flex; flex-direction:column; align-items:center; gap:.6rem; margin-bottom:1.25rem; }
    .eq-foto {
      width: 100%; max-width: 420px; aspect-ratio: 4 / 3; border-radius: 14px;
      background: var(--gray-100); border: 1px solid var(--gray-200);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      color: var(--gray-400);
    }
    .eq-foto img { width:100%; height:100%; object-fit:cover; }
    .eq-foto svg { width:56px; height:56px; }
    .eq-foto-actions { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
    #eq-file, #eq-file-cam { display:none; }

    /* Ficha (campos) */
    .eq-card { background:#fff; border:1px solid var(--gray-200); border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; }
    .eq-card h2 { font-size:1rem; color:var(--gray-700); margin:0; }
    .eq-card-head { display:flex; align-items:center; justify-content:space-between; gap:.5rem; margin-bottom:.85rem; }
    .form-control[readonly] { background:var(--gray-100); color:var(--gray-600); cursor:default; }
    .eq-estado-row { display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding-top:.9rem; margin-top:.35rem; border-top:1px solid var(--gray-100); }
    .eq-estado-row .eq-estado-lbl { color:var(--gray-600); font-size:.9rem; }

    /* Repuestos */
    .eq-item-row { display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem; }
    .eq-item-row input { flex:1; }
    .eq-item-del { border:none; background:none; color:var(--gray-400); cursor:pointer; font-size:1.4rem; line-height:1; padding:.2rem .35rem; border-radius:8px; }
    .eq-item-del:hover { color:#d64545; background:var(--gray-100); }
    .eq-items-empty { color:var(--gray-500); font-size:.85rem; margin:.25rem 0 .6rem; }

    .eq-save-bar { position:sticky; bottom:0; background:linear-gradient(transparent, var(--gray-50, #f7f8fa) 40%); padding:1rem 0 .5rem; display:flex; gap:.6rem; justify-content:flex-end; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand u-pointer" onclick="window.location.href='menu.html'">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Ficha de Equipo</span>
  </div>
  <div class="header-user">
    <div class="user-badge"><span id="hdr-name">—</span></div>
    <button class="btn btn-sm btn-outline btn-icon" id="btn-back" aria-label="Volver" title="Volver"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
  </div>
</header>

<main class="app-main">
  <div class="eq-ficha" id="eq-ficha" style="display:none">

    <!-- Foto -->
    <div class="eq-foto-wrap">
      <div class="eq-foto" id="eq-foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <input type="file" id="eq-file" accept="image/*">
      <input type="file" id="eq-file-cam" accept="image/*" capture="environment">
      <div class="eq-foto-actions">
        <button class="btn btn-sm btn-outline" id="btn-foto-cam">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Sacar foto
        </button>
        <button class="btn btn-sm btn-outline" id="btn-foto">Agregar foto</button>
        <button class="btn btn-sm btn-danger" id="btn-foto-del" style="display:none">Quitar</button>
      </div>
    </div>

    <!-- Datos -->
    <div class="eq-card">
      <div class="eq-card-head">
        <h2>Datos del equipo</h2>
        <button class="btn btn-sm btn-outline" id="btn-edit-datos">Editar</button>
      </div>
      <div class="form-group">
        <label for="eq-codigo">Código *</label>
        <input type="text" id="eq-codigo" class="form-control" placeholder="Ej: C 172" readonly>
      </div>
      <div class="form-group u-mb-0">
        <label for="eq-tipo">Tipo / Descripción</label>
        <input type="text" id="eq-tipo" class="form-control" placeholder="Ej: Camion L111" readonly>
      </div>
      <div class="eq-estado-row">
        <span class="eq-estado-lbl">Estado: <span id="eq-estado-badge" class="u-badge">—</span></span>
        <button class="btn btn-sm" id="btn-toggle-activo">—</button>
      </div>
    </div>

    <!-- Ubicación -->
    <div class="eq-card">
      <h2>Ubicación actual</h2>
      <div class="form-group u-mb-0" style="margin-top:.75rem">
        <label for="eq-ubicacion">Obra donde se encuentra</label>
        <select id="eq-ubicacion" class="form-control">
          <option value="">Sin asignar</option>
        </select>
      </div>
    </div>

    <!-- Repuestos y características -->
    <div class="eq-card">
      <h2>Repuestos y características</h2>
      <div id="eq-items"></div>
      <button class="btn btn-sm btn-outline" id="btn-add-item">+ Agregar renglón</button>
    </div>

    <div id="eq-error" class="alert alert-error hidden"></div>

    <div class="eq-save-bar">
      <button class="btn btn-primary" id="btn-save">Guardar cambios</button>
    </div>
  </div>

  <div id="eq-loading" class="hist-loading">Cargando ficha…</div>
</main>

<!-- Modal: Confirmar acción -->
<div class="modal-overlay hidden" id="modal-confirm">
  <div class="modal modal--sm">
    <div class="modal-header">
      <span class="modal-title" id="modal-confirm-title">Confirmar</span>
    </div>
    <div class="modal-body" style="text-align:center;padding:1.5rem 1.25rem;">
      <p id="modal-confirm-msg" style="color:var(--gray-600);"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-confirm-no">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm-yes">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/equipo.js"></script>
</body>
</html>
