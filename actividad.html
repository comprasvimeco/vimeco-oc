<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Novedades</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <style>
    .act-banner {
      background: #fffae6; border: 1px solid #f5d97a; color: #7a5b00;
      border-radius: var(--radius); padding: .6rem .85rem; margin-bottom: .9rem;
      font-size: .88rem; font-weight: 600;
    }
    .act-filters { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .25rem; }
    /* act-chip es sólo el aspecto; act-filter y act-range son los hooks de JS. */
    .act-chip {
      border: 1px solid var(--gray-300); background: #fff; color: var(--gray-600);
      border-radius: 999px; padding: .35rem .85rem; font-size: .82rem; cursor: pointer;
    }
    .act-chip.active { background: var(--primary, #1a3a5c); color: #fff; border-color: var(--primary, #1a3a5c); }

    /* ---- Alerta: OC sin respaldo en Drive ---- */
    /* Rojo: no es una novedad más del feed, es una OC cuyo PDF no está
       archivado. Por eso vive arriba de los filtros y no dentro de la lista. */
    .act-alert { background: #fef4f4; border: 1px solid #f3c9c9; border-radius: var(--radius);
      padding: .85rem 1rem; margin-bottom: 1rem; }
    .act-alert-hd { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
      font-size: .85rem; font-weight: 600; color: #a12b2b; margin-bottom: .2rem; }
    .act-alert-sub { font-size: .78rem; color: #8a4b4b; margin-bottom: .7rem; }
    .act-alert-list { display: flex; flex-wrap: wrap; gap: .4rem; }
    .act-alert-oc { display: flex; align-items: center; gap: .45rem; background: var(--white);
      border: 1px solid #eec9c9; border-radius: 999px; padding: .3rem .6rem; font-size: .78rem; }
    .act-alert-oc b { font-weight: 600; }
    .act-alert-oc span { color: var(--gray-500); }
    .act-alert-actions { margin-top: .8rem; }

    /* ---- Rango de fechas ---- */
    .act-dates {
      display: flex; flex-wrap: wrap; gap: .5rem .9rem; align-items: center;
      justify-content: space-between; margin: .55rem 0 .9rem;
      padding-bottom: .8rem; border-bottom: 1px solid var(--gray-200);
    }
    .act-ranges { display: flex; gap: .4rem; flex-wrap: wrap; }
    .act-custom { display: flex; align-items: center; gap: .35rem; flex-wrap: wrap; }
    .act-custom label {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--gray-500); font-weight: 700;
    }
    .act-custom input[type=date] {
      padding: .3rem .45rem; border: 1px solid var(--gray-300);
      border-radius: var(--radius); font: inherit; font-size: .8rem;
      color: var(--gray-700); background: #fff;
    }
    .act-day {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: var(--gray-500); margin: 1.1rem .15rem .45rem;
    }
    .act-day:first-of-type { margin-top: .3rem; }
    .act-card { padding: .7rem .85rem; transition: background .2s; }
    .act-card-unseen { border-left: 3px solid var(--primary, #1a3a5c); }
    .act-card-seen { background: #eef7f1; }
    .act-card-seen .act-title, .act-card-seen .act-detalle { color: var(--gray-500); }
    /* Fuera de la ventana de novedades: es historial, no reclama atención. */
    .act-card-old .act-title, .act-card-old .act-detalle { color: var(--gray-500); }
    .act-row { display: flex; align-items: center; gap: .7rem; }
    .act-badge {
      display: inline-flex; align-items: center; gap: .3rem; flex: 0 0 auto;
      font-size: .72rem; font-weight: 700; padding: .25rem .5rem; border-radius: 6px;
      white-space: nowrap;
    }
    .act-badge .icon { width: 13px; height: 13px; }
    .act-t-oc      { background: #e6f0fb; color: #1a3a5c; }
    .act-t-adjunto { background: #e9f7ee; color: #1b6b3a; }
    .act-t-caja    { background: #fdeede; color: #8a4b00; }
    .act-body { flex: 1 1 auto; min-width: 0; }
    .act-title {
      font-weight: 600; font-size: .92rem; color: var(--gray-800);
      display: flex; align-items: center; gap: .4rem;
    }
    .act-detalle { font-size: .82rem; color: var(--gray-600); margin-top: .1rem; }
    .act-meta { font-size: .74rem; color: var(--gray-500); margin-top: .15rem; }
    .act-actions { flex: 0 0 auto; display: flex; flex-direction: column; gap: .35rem; align-items: stretch; }
    .act-drive { white-space: nowrap; text-align: center; }
    .act-mark { white-space: nowrap; }
    .act-seen-label {
      display: inline-flex; align-items: center; justify-content: center; gap: .25rem;
      font-size: .74rem; font-weight: 700; color: #1b6b3a;
    }
    .act-seen-label .icon { width: 13px; height: 13px; }
    .act-nodrive { font-size: .74rem; color: var(--gray-400); font-style: italic; text-align: center; }
    @media (max-width: 560px) {
      .act-row { flex-wrap: wrap; }
      .act-actions { flex-direction: row; margin-left: auto; align-items: center; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand u-pointer" onclick="window.location.href='menu.html'">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Novedades</span>
  </div>
  <div class="header-user">
    <div class="user-badge">
      <span id="hdr-name">—</span>
    </div>
    <button class="btn btn-sm btn-outline btn-icon" id="btn-back" aria-label="Volver" title="Volver"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
  </div>
</header>

<main class="app-main">
  <div class="hist-page">

    <div id="act-banner" class="act-banner hidden"></div>

    <div id="act-sinrespaldo" class="act-alert hidden"></div>

    <div class="hist-toolbar">
      <div class="act-filters">
        <button class="act-chip act-filter active" data-filter="all">Todas</button>
        <button class="act-chip act-filter" data-filter="oc">Órdenes de Compra</button>
        <button class="act-chip act-filter" data-filter="adjunto">Adjuntos</button>
        <button class="act-chip act-filter" data-filter="caja">Caja</button>
      </div>
      <span class="hist-count" id="act-count"></span>
    </div>

    <div class="act-dates">
      <div class="act-ranges">
        <button class="act-chip act-range" data-range="7">7 días</button>
        <button class="act-chip act-range active" data-range="30">30 días</button>
        <button class="act-chip act-range" data-range="90">90 días</button>
        <button class="act-chip act-range" data-range="all">Todo</button>
      </div>
      <div class="act-custom">
        <label for="act-desde">Desde</label>
        <input type="date" id="act-desde">
        <label for="act-hasta">Hasta</label>
        <input type="date" id="act-hasta">
      </div>
    </div>

    <div id="act-list" class="hist-list">
      <div class="hist-loading">Cargando novedades…</div>
    </div>
  </div>
</main>

<!-- Modal: Confirmar acción -->
<div class="modal-overlay hidden" id="modal-confirm">
  <div class="modal modal--sm">
    <div class="modal-header"><span class="modal-title" id="modal-confirm-title">Confirmar</span></div>
    <div class="modal-body" style="text-align:center;padding:1.5rem 1.25rem;">
      <p id="modal-confirm-msg" style="color:var(--gray-600);"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-confirm-no">Cancelar</button>
      <button class="btn btn-danger" id="modal-confirm-yes">Borrar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<!-- jspdf/logoBase64/ocGenerator/drive: para regenerar y resubir el PDF de una
     OC sin respaldo desde el panel de arriba. -->
<script src="js/jspdf.umd.min.js"></script>
<script src="js/logoBase64.js"></script>
<script src="js/ocGenerator.js"></script>
<script src="js/drive.js"></script>
<script src="js/driveBackup.js"></script>
<script src="js/actividad.js"></script>
</body>
</html>
