[build]
  command = "node build.js"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://generativelanguage.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://oauth2.googleapis.com https://www.googleapis.com; media-src 'self' blob:; worker-src 'self';"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
