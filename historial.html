<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Historial de OC</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
</head>
<body>

<header class="app-header">
  <div class="header-brand u-pointer" onclick="window.location.href='menu.html'">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Historial de OC</span>
  </div>
  <div class="header-user">
    <div class="user-badge">
      <span id="hdr-name">—</span>
    </div>
    <button class="btn btn-sm btn-outline" id="btn-adjuntar"><svg class="icon" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg> Adjuntar</button>
    <button class="btn btn-sm btn-outline btn-icon" id="btn-back" aria-label="Volver" title="Volver"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
  </div>
</header>

<main class="app-main">
  <div class="hist-page">

    <div class="hist-toolbar">
      <input type="search" id="hist-search" class="hist-search" placeholder="Buscar por proveedor, obra o N° OC…">
      <div class="hist-date-filter">
        <label class="hist-date-label" for="hist-desde">Desde</label>
        <input type="date" id="hist-desde" class="hist-date-input">
        <label class="hist-date-label" for="hist-hasta">Hasta</label>
        <input type="date" id="hist-hasta" class="hist-date-input">
        <button class="btn btn-sm btn-outline hidden" id="btn-clear-dates" title="Limpiar fechas"><svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <span class="hist-count" id="hist-count"></span>
    </div>
    <div id="hist-list" class="hist-list">
      <div class="hist-loading">Cargando historial…</div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script src="js/jspdf.umd.min.js"></script>
<script src="js/logoBase64.js"></script>
<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/driveQueue.js"></script>
<script src="js/ocGenerator.js"></script>
<script src="js/historial.js"></script>
</body>
</html>
