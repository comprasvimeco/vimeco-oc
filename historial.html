<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Historial de OC</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Historial de OC</span>
  </div>
  <div class="header-user">
    <div class="user-badge">
      <span id="hdr-name">—</span>
    </div>
    <button class="btn btn-sm btn-outline" id="btn-back">← Volver</button>
    <button class="btn btn-sm btn-secondary" id="btn-logout">Salir</button>
  </div>
</header>

<main class="app-main">
  <div class="hist-page">

    <!-- Banner modo adjuntar (visible solo cuando llega archivo compartido) -->
    <div id="attach-banner" class="attach-banner hidden">
      <div>
        <span style="font-weight:600;">📎 Modo adjuntar:</span>
        <span id="attach-banner-filename" style="margin-left:.35rem;word-break:break-all;"></span>
        <div style="font-size:.78rem;margin-top:.15rem;opacity:.8;">Tocá el botón 📎 en la OC donde querés guardar este archivo.</div>
      </div>
      <button id="btn-attach-cancel" class="btn btn-sm btn-secondary" style="flex-shrink:0;">Cancelar</button>
    </div>

    <div class="hist-toolbar">
      <input type="search" id="hist-search" class="hist-search" placeholder="Buscar por proveedor, obra o N° OC…">
      <div class="hist-date-filter">
        <label class="hist-date-label" for="hist-desde">Desde</label>
        <input type="date" id="hist-desde" class="hist-date-input">
        <label class="hist-date-label" for="hist-hasta">Hasta</label>
        <input type="date" id="hist-hasta" class="hist-date-input">
        <button class="btn btn-sm btn-outline hidden" id="btn-clear-dates" title="Limpiar fechas">✕</button>
      </div>
      <span class="hist-count" id="hist-count"></span>
    </div>
    <div id="hist-list" class="hist-list">
      <div class="hist-loading">Cargando historial…</div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script src="js/jspdf.umd.min.js"></script>
<script src="js/logoBase64.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/drive.js"></script>
<script src="js/ocGenerator.js"></script>
<script src="js/historial.js"></script>
</body>
</html>
