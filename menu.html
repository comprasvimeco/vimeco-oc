<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Sistema</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VIMECO OC">
  <style>
    #menu-card-novedades .menu-card-icon,
    #menu-card-autorizaciones .menu-card-icon { position: relative; }
    .menu-card-badge {
      position: absolute; top: -6px; right: -6px; min-width: 20px; height: 20px;
      padding: 0 5px; border-radius: 999px; background: #d64545; color: #fff;
      font-size: .72rem; font-weight: 700; line-height: 20px; text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .menu-version { text-align: center; color: var(--gray-400); font-size: .72rem; margin-top: 1.75rem; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Sistema de Gestión</span>
  </div>
  <div class="header-user">
    <div class="user-badge">
      <span id="hdr-name">—</span>
    </div>
    <button class="btn btn-sm btn-outline" id="btn-logout">Salir</button>
  </div>
</header>

<main class="app-main menu-main">
  <p class="menu-welcome">Bienvenido/a, <strong id="menu-nombre">—</strong>. ¿Qué querés hacer?</p>
  <div class="menu-grid">
    <a href="compras.html" class="menu-card">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
        </svg>
      </div>
      <div class="menu-card-title">Compras</div>
    </a>
    <a href="caja.html" class="menu-card" id="menu-card-caja">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
        </svg>
      </div>
      <div class="menu-card-title">Caja</div>
    </a>
    <a href="personal.html" class="menu-card" id="menu-card-personal" style="display:none">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
      <div class="menu-card-title">Personal</div>
    </a>
    <a href="actividad.html" class="menu-card" id="menu-card-novedades" style="display:none">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span id="novedades-badge" class="menu-card-badge hidden"></span>
      </div>
      <div class="menu-card-title">Novedades</div>
    </a>
    <a href="autorizaciones.html" class="menu-card" id="menu-card-autorizaciones" style="display:none">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 11l-3 3-2-2"/>
        </svg>
        <span id="autorizaciones-badge" class="menu-card-badge hidden"></span>
      </div>
      <div class="menu-card-title">Autorizaciones</div>
    </a>
    <a href="equipos.html" class="menu-card" id="menu-card-equipos" style="display:none">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13"/>
          <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div class="menu-card-title">Equipos</div>
    </a>
    <a href="reportes.html" class="menu-card" id="menu-card-reportes" style="display:none">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="19" x2="18" y2="10"/>
          <line x1="12" y1="19" x2="12" y2="4"/>
          <line x1="6" y1="19" x2="6" y2="14"/>
          <line x1="3" y1="20" x2="21" y2="20"/>
        </svg>
      </div>
      <div class="menu-card-title">Reportes</div>
    </a>
    <a href="administracion.html" class="menu-card" id="menu-card-admin" style="display:none">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </div>
      <div class="menu-card-title">Administración</div>
    </a>
  </div>
  <div class="menu-version" id="menu-version">v160</div>
</main>

<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script>
  const _s = (() => { try { return JSON.parse(localStorage.getItem('vimeco_session')); } catch(_) { return null; } })();
  if (!_s?.codigo) {
    window.location.href = 'index.html';
  } else {
    document.getElementById('hdr-name').textContent = _s.nombre;
    document.getElementById('menu-nombre').textContent = _s.nombre;
    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('vimeco_session');
      window.location.href = 'index.html';
    });
    // Administración: solo super-admin (0000).
    if (_s.codigo === '0000') {
      document.getElementById('menu-card-admin').style.display = '';
      // Equipos: el admin lo ve en el menú igual que un Jefe de Taller.
      document.getElementById('menu-card-equipos').style.display = '';
      document.getElementById('menu-card-reportes').style.display = '';
    }

    // Autorizaciones: visible si tengo OC para firmar (me las pidieron) o si yo
    // pedí autorización de alguna. El globito cuenta lo accionable: pendientes de
    // mi firma + pedidos míos ya resueltos (aprobados/rechazados) que no vi.
    if (typeof getAutorizacionesPendientes === 'function' && typeof getMisSolicitudes === 'function') {
      Promise.all([
        getAutorizacionesPendientes(_s.codigo).catch(() => []),
        getMisSolicitudes(_s.codigo).catch(() => [])
      ]).then(([paraFirmar, misPedidos]) => {
        let seen = [];
        try { seen = JSON.parse(localStorage.getItem('vimeco_solicitudes_vistas_' + _s.codigo) || '[]'); } catch (_) {}
        const resueltasSinVer = misPedidos.filter(oc =>
          (oc.estado === 'autorizada' || oc.estado === 'rechazada') && !seen.includes(oc._key)).length;
        if (paraFirmar.length || misPedidos.length) {
          document.getElementById('menu-card-autorizaciones').style.display = '';
        }
        const n = paraFirmar.length + resueltasSinVer;
        if (n > 0) {
          const b = document.getElementById('autorizaciones-badge');
          b.textContent = n > 99 ? '99+' : String(n);
          b.classList.remove('hidden');
        }
      }).catch(() => {});
    }

    // Personal: visible para 0000, admins o jefes de obra.
    const personalCard = document.getElementById('menu-card-personal');

    // Novedades: visible para admins (0000 o permiso `admin`), con badge de no vistas.
    const novCard = document.getElementById('menu-card-novedades');
    function revealNovedades() {
      novCard.style.display = '';
      if (typeof getActividad !== 'function') return;
      getActividad(7).then(evs => {
        let seen = [];
        try { seen = JSON.parse(localStorage.getItem('vimeco_actividad_vistas_' + _s.codigo) || '[]'); } catch (_) {}
        const nuevos = evs.filter(e => !seen.includes(e.key)).length;
        if (nuevos > 0) {
          const b = document.getElementById('novedades-badge');
          b.textContent = nuevos > 99 ? '99+' : String(nuevos);
          b.classList.remove('hidden');
        }
      }).catch(() => {});
    }

    // Caja: visible para 0000, o para usuarios con permiso `caja` o `admin`.
    const cajaCard = document.getElementById('menu-card-caja');
    if (_s.codigo === '0000') {
      cajaCard.style.display = '';
      personalCard.style.display = '';
      revealNovedades();
    } else {
      cajaCard.style.display = 'none';
      if (typeof getUsuario === 'function') {
        getUsuario(_s.codigo)
          .then(u => {
            if (u && (u.caja || u.admin)) cajaCard.style.display = '';
            if (u && (u.admin || u.jefeObra)) personalCard.style.display = '';
            if (u && u.jefeTaller) document.getElementById('menu-card-equipos').style.display = '';
            if (u && (u.admin || u.reportes)) document.getElementById('menu-card-reportes').style.display = '';
            if (u && u.admin) revealNovedades();
          })
          .catch(() => {});
      }
    }
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/vimeco-oc/sw.js', { updateViaCache: 'none' })
      .then(reg => reg.update()).catch(() => {});
    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible')
        navigator.serviceWorker.ready.then(reg => reg.update()).catch(() => {});
    });
  }
</script>
</body>
</html>
