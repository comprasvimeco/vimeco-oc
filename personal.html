<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Personal</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VIMECO OC">
</head>
<body data-tour="personal" data-tour-menu="self">

<header class="app-header">
  <div class="header-brand u-pointer" onclick="window.location.href='menu.html'">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Personal</span>
  </div>
  <div class="header-user">
    <div class="user-badge"><span id="hdr-name">—</span></div>
    <div class="hdr-menu-wrap">
      <button class="btn btn-sm btn-outline" id="btn-menu" title="Menú"><svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="hdr-dropdown hidden" id="hdr-dropdown">
        <button class="hdr-drop-item" id="btn-ayuda"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Ayuda</button>
      </div>
    </div>
    <button class="btn btn-sm btn-outline btn-icon" id="btn-back" aria-label="Volver" title="Volver"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
  </div>
</header>

<main class="app-main">
  <div class="hist-page">
    <div class="hist-toolbar">
      <span style="font-weight:600;color:var(--gray-700);">Elegí una obra</span>
    </div>
    <div id="obras-list" class="users-list">
      <div class="hist-loading">Cargando obras…</div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/tutoriales.js"></script>
<script src="js/tour.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/personal.js"></script>
</body>
</html>
