<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIMECO S.A. — Compras</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="icono_app.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VIMECO OC">
  <style>
    #card-novedades .menu-card-icon { position: relative; }
    .menu-card-badge {
      position: absolute; top: -6px; right: -6px; min-width: 20px; height: 20px;
      padding: 0 5px; border-radius: 999px; background: #d64545; color: #fff;
      font-size: .72rem; font-weight: 700; line-height: 20px; text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand" style="cursor:pointer" onclick="window.location.href='menu.html'">
    <img src="assets/logo_claro.png" id="header-logo" alt="VIMECO" class="header-logo"
      onerror="this.style.display='none';document.getElementById('header-logo-fb').style.display='inline'">
    <span id="header-logo-fb" class="header-logo-fallback" style="display:none">VIMECO S.A.</span>
    <span class="header-title">Compras</span>
  </div>
  <div class="header-user">
    <div class="user-badge">
      <span id="hdr-name">—</span>
    </div>
    <button class="btn btn-sm btn-outline" id="btn-logout">Salir</button>
  </div>
</header>

<main class="app-main menu-main">
  <p class="menu-welcome">Compras — ¿qué querés hacer?</p>
  <div class="menu-grid menu-grid-3">
    <a href="app.html" class="menu-card">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      </div>
      <div class="menu-card-title">Orden de Compra</div>
    </a>
    <a href="adjuntar.html" class="menu-card">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </div>
      <div class="menu-card-title">Adjuntar</div>
    </a>
    <a href="historial.html" class="menu-card">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="menu-card-title">Historial</div>
    </a>
    <a href="actividad.html" class="menu-card hidden" id="card-novedades">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span id="novedades-badge" class="menu-card-badge hidden"></span>
      </div>
      <div class="menu-card-title">Novedades</div>
    </a>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script>
  const _s = (() => { try { return JSON.parse(localStorage.getItem('vimeco_session')); } catch(_) { return null; } })();
  if (!_s?.codigo) {
    window.location.href = 'index.html';
  } else {
    document.getElementById('hdr-name').textContent = _s.nombre;
    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('vimeco_session');
      window.location.href = 'index.html';
    });

    // Novedades: visible sólo para admins, con badge de operaciones no vistas
    (async () => {
      let isAdmin = _s.codigo === '0000';
      if (!isAdmin) {
        try { const u = await getUsuario(_s.codigo); isAdmin = !!(u && u.admin); } catch (_) {}
      }
      if (!isAdmin) return;
      document.getElementById('card-novedades').classList.remove('hidden');
      try {
        const eventos  = await getActividad(7);
        const lastSeen = parseInt(localStorage.getItem(`vimeco_actividad_seen_${_s.codigo}`) || '0', 10);
        const nuevos   = eventos.filter(e => (e.timestamp || 0) > lastSeen).length;
        if (nuevos > 0) {
          const b = document.getElementById('novedades-badge');
          b.textContent = nuevos > 99 ? '99+' : String(nuevos);
          b.classList.remove('hidden');
        }
      } catch (_) {}
    })();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/vimeco-oc/sw.js', { updateViaCache: 'none' })
      .then(reg => reg.update()).catch(() => {});
    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible')
        navigator.serviceWorker.ready.then(reg => reg.update()).catch(() => {});
    });
  }
</script>
</body>
</html>
